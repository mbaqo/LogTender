name: Backend Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: logtender
          POSTGRES_PASSWORD: logtender
          POSTGRES_DB: logtender_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U logtender -d logtender_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DB_USER: logtender
      DB_PASSWORD: logtender
      DB_NAME: logtender_test
      DATABASE_URL: postgresql+psycopg2://logtender:logtender@localhost:5432/logtender_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Apply migrations to empty PostgreSQL database
        run: uv run alembic upgrade head

      - name: Run backend tests
        run: uv run pytest
